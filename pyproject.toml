# Python Project Configuration for NORM-Nav

[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | build
  | install
  | log
  | __pycache__
  | \.egg-info
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = [
    "build",
    "install",
    "log",
    "__pycache__",
    ".venv",
    "venv"
]
known_first_party = [
    "navibot_bringup",
    "navibot_navigation",
    "navibot_costmap",
    "navibot_lio_interface",
    "navibot_simulation"
]
known_third_party = [
    "rclpy",
    "numpy",
    "scipy",
    "sensor_msgs",
    "nav_msgs",
    "geometry_msgs"
]
sections = [
    "FUTURE",
    "STDLIB",
    "THIRDPARTY",
    "FIRSTPARTY",
    "LOCALFOLDER"
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Gradually enforce
disallow_incomplete_defs = false  # Gradually enforce
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_optional = true

exclude = [
    'build/',
    'install/',
    'log/',
    '__pycache__/',
]

[[tool.mypy.overrides]]
module = [
    "rclpy.*",
    "sensor_msgs.*",
    "nav_msgs.*",
    "geometry_msgs.*",
    "tf2_ros.*",
    "tf2_geometry_msgs.*",
    "ament_index_python.*",
]
ignore_missing_imports = true

[tool.pylint.messages_control]
max-line-length = 120
disable = [
    "C0103",  # Invalid name (for ROS2 conventions)
    "R0913",  # Too many arguments (common in ROS2)
    "R0902",  # Too many instance attributes (common in ROS2 nodes)
]

[tool.pylint.basic]
good-names = ["i", "j", "k", "x", "y", "z", "id", "tf"]

